name: Deploy Doggy HR Update

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type DEPLOY to confirm'
        required: true
        default: ''

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'DEPLOY'
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-auth google-auth-httplib2 google-api-python-client

      - name: Download files from Google Drive
        env:
          GDRIVE_CREDENTIALS: ${{ secrets.GDRIVE_CREDENTIALS }}
        run: python3 drive_download.py

      - name: Verify files
        run: |
          test -f doggy-hr-quiz-v5.html && echo "quiz OK" || exit 1
          test -f videos.html && echo "videos OK" || exit 1

      - name: Commit and push
        run: |
          git config user.name "Doggy HR Bot"
          git config user.email "doggydoggyhr@gmail.com"
          git add doggy-hr-quiz-v5.html videos.html
          [ -f quiz.html ] && git add quiz.html || true
          [ -f index.html ] && git add index.html || true
          git diff --staged --quiet && echo "No changes" || git commit -m "Doggy HR update $(date +'%Y-%m-%d')"
          git push
