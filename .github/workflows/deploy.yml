name: Deploy Doggy HR Update

on:
  schedule:
    - cron: '0 * * * *'  # runs every hour
  workflow_dispatch:      # keep manual trigger as backup
    inputs:
      confirm:
        description: 'Type DEPLOY to confirm'
        required: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-auth google-auth-httplib2 google-api-python-client

      - name: Check and download files from Google Drive
        env:
          GDRIVE_CREDENTIALS: ${{ secrets.GDRIVE_CREDENTIALS }}
        run: python3 drive_download.py

      - name: Check if files were downloaded
        id: check_files
        run: |
          if [ -f doggy-hr-quiz-v5.html ] && [ -f videos.html ]; then
            echo "files_ready=true" >> $GITHUB_OUTPUT
          else
            echo "files_ready=false" >> $GITHUB_OUTPUT
            echo "No new files to deploy"
          fi

      - name: Commit and push
        if: steps.check_files.outputs.files_ready == 'true'
        run: |
          git config user.name "Doggy HR Bot"
          git config user.email "doggydoggyhr@gmail.com"
          git add doggy-hr-quiz-v5.html videos.html
          [ -f quiz.html ] && git add quiz.html || true
          [ -f index.html ] && git add index.html || true
          git diff --staged --quiet && echo "No changes to commit" || git commit -m "Doggy HR update $(date +'%Y-%m-%d')"
          git push
          echo "Deployed successfully"
